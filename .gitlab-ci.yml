stages:
  - build

build_image:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  only:
    - tags
  variables:
    IMAGE: ghcr.io/wvogel/uptime-kuma-api
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"ghcr.io\":{\"username\":\"wvogel\",\"password\":\"${GHCR_TOKEN}\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor
      --context "$CI_PROJECT_DIR"
      --dockerfile "$CI_PROJECT_DIR/Dockerfile"
      --destination "$IMAGE:latest"
      --destination "$IMAGE:$CI_COMMIT_TAG"
